<title>每日开源精选 · 归档</title>
<style>
  :root{
    --bg:#f5f6f8; --card:#ffffff; --ink:#1a1a1a; --sub:#5b6470;
    --line:#e8eaed; --brand:#0b8457; --brand-soft:#e6f4ee; --accent:#c2410c;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    line-height:1.75;font-size:16px;}
  .wrap{max-width:880px;margin:0 auto;padding:40px 20px 80px;}
  header{margin-bottom:30px;}
  h1{font-size:30px;margin:0 0 6px;letter-spacing:.2px;}
  .lead{color:var(--sub);font-size:15px;}
  .stats{display:flex;gap:14px;flex-wrap:wrap;margin:18px 0 28px;font-size:13.5px;color:var(--sub);}
  .stats span b{color:var(--ink);font-weight:600;}
  .day{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:18px 22px;margin:0 0 14px;box-shadow:0 1px 3px rgba(16,24,40,.04);}
  .day .date{display:inline-block;background:var(--brand-soft);color:var(--brand);
    font-size:12.5px;font-weight:600;padding:3px 10px;border-radius:6px;letter-spacing:.5px;}
  .day h2{margin:10px 0 4px;font-size:18px;}
  .day h2 a{color:var(--ink);text-decoration:none;}
  .day h2 a:hover{color:var(--brand);}
  .picks{margin:8px 0 0;padding-left:0;list-style:none;color:var(--sub);font-size:14.5px;}
  .picks li{padding:3px 0;}
  .picks li b{color:var(--ink);font-weight:600;}
  .topic{margin-top:8px;font-size:14px;color:var(--accent);}
  .topic b{color:var(--accent);}
  .empty{background:var(--card);border:1px dashed var(--line);border-radius:14px;
    padding:30px;text-align:center;color:var(--sub);}
  footer{text-align:center;color:#9aa3ad;font-size:12.5px;margin-top:36px;}
  footer a{color:#9aa3ad;}
</style>
</head>
<body>
